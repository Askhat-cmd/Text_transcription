<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Загрузить книгу</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="topbar">
    <div class="brand">Bot_data_base</div>
    <nav class="nav">
      <a href="/">Дашборд</a>
      <a href="/youtube">Добавить YouTube</a>
      <a href="/registry">Реестр</a>
    </nav>
  </header>

  <main class="container">
    <section class="card form-card">
      <h1>Загрузка книги</h1>
      <p class="muted">Поддерживаются .txt и .md. Большие файлы загружаются дольше.</p>

      <div id="drop-zone" class="drop-zone">
        <span id="drop-label">Перетащите файл сюда или кликните для выбора</span>
        <input id="book-file" type="file" accept=".txt,.md" hidden />
      </div>

      <div class="row">
        <div class="col">
          <label class="label">Автор</label>
          <input id="book-author" type="text" placeholder="Автор" />
        </div>
        <div class="col">
          <label class="label">Author ID</label>
          <input id="book-author-id" type="text" placeholder="например: tolle_eckhart" />
        </div>
      </div>

      <div class="row">
        <div class="col">
          <label class="label">Название книги</label>
          <input id="book-title" type="text" placeholder="Название" />
        </div>
        <div class="col">
          <label class="label">Язык</label>
          <select id="book-lang">
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <button id="book-submit" class="btn">Загрузить и обработать</button>

      <div id="book-job" class="jobs"></div>
    </section>
  </main>

  <script src="/static/books.js"></script>
</body>
</html>
