<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Добавить YouTube</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="topbar">
    <div class="brand">Bot_data_base</div>
    <nav class="nav">
      <a href="/">Дашборд</a>
      <a href="/books">Загрузить книгу</a>
      <a href="/registry">Реестр</a>
    </nav>
  </header>

  <main class="container">
    <section class="card form-card">
      <h1>Добавить YouTube</h1>
      <p class="muted">Вставьте ссылки — по одной на строку. Приоритет: русские субтитры, затем английские.</p>

      <label class="label">YouTube URL</label>
      <textarea id="yt-urls" rows="6" placeholder="https://youtube.com/watch?v=..."></textarea>

      <div class="row">
        <div class="col">
          <label class="label">Автор</label>
          <input id="yt-author" type="text" placeholder="Автор" />
        </div>
        <div class="col">
          <label class="label">Author ID</label>
          <input id="yt-author-id" type="text" placeholder="например: tolle_eckhart" />
        </div>
      </div>

      <button id="yt-submit" class="btn">Начать обработку</button>

      <div id="yt-jobs" class="jobs"></div>
    </section>
  </main>

  <script src="/static/youtube.js"></script>
</body>
</html>
