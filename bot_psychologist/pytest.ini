[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -p no:doctest
    --ignore=tests/test_phase1.py
    --ignore=tests/test_phase2.py
    --ignore=tests/test_phase3.py
    --ignore=tests/test_fast_detector.py
    --ignore=tests/test_sd_classifier.py
    --ignore=tests/test_sd_integration.py
    --ignore=tests/test_full_dialogue_pipeline.py
